services:
  command-center:
    build:
      context: ./apps/command-center
    container_name: voc-command-center
    restart: unless-stopped
    environment:
      VOC_DB_PATH: /app/data/voc.db
      VOC_ROOT: /voc
      NODE_ENV: production
      HOSTNAME: 127.0.0.1
      PORT: 3010
      OLLAMA_BASE_URL: http://127.0.0.1:11434
      NINE_ROUTER_URL: http://127.0.0.1:20128
      NINE_ROUTER_RUNTIME_MODE: manual
    network_mode: host
    volumes:
      - ./docs:/voc/docs:ro
      - ./memory:/voc/memory:ro
      - ./reports:/voc/reports:ro
      - command-center-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges:true

volumes:
  command-center-data:
